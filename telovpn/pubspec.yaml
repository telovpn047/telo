name: telovpn
description: TeloVPN - Türkmen VPN Goragy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  fluttertoast: ^8.2.4
  share_plus: ^9.0.0
  mobile_scanner: ^5.1.1
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.3
  dart_ping: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
