name: Build APK

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'telovpn/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'telovpn/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Create asset directories
        run: |
          mkdir -p telovpn/assets/icons
          mkdir -p telovpn/assets/images
          mkdir -p telovpn/android/app/src/main/assets/xray

      - name: Download Xray Core binaries
        run: |
          RELEASE=$(curl -fsSL https://api.github.com/repos/XTLS/Xray-core/releases/latest)
          XRAY_VERSION=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "Xray Core: ${XRAY_VERSION}"
          echo "Available assets:"
          echo "$RELEASE" | jq -r '.assets[].name'

          BASE="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}"
          ADIR="telovpn/android/app/src/main/assets/xray"

          # arm64-v8a (required — fails build if missing)
          curl -fL "${BASE}/Xray-android-arm64-v8a.zip" -o /tmp/arm64.zip
          unzip -p /tmp/arm64.zip xray > "${ADIR}/xray_arm64"

          # x86_64 (optional — emulator/testing only; falls back to arm64)
          if curl -fL "${BASE}/Xray-android-x86_64.zip" -o /tmp/x64.zip 2>/dev/null; then
            unzip -p /tmp/x64.zip xray > "${ADIR}/xray_x64"
          else
            echo "x86_64 not available, copying arm64"
            cp "${ADIR}/xray_arm64" "${ADIR}/xray_x64"
          fi

          chmod +x "${ADIR}"/xray_*
          ls -lh "${ADIR}"/

      - name: Download GeoData
        run: |
          curl -fL "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" \
            -o telovpn/android/app/src/main/assets/xray/geoip.dat
          curl -fL "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat" \
            -o telovpn/android/app/src/main/assets/xray/geosite.dat
          ls -lh telovpn/android/app/src/main/assets/xray/

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > telovpn/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"   >> telovpn/android/local.properties
          cat telovpn/android/local.properties

      - name: Flutter pub get
        working-directory: telovpn
        run: flutter pub get

      - name: Flutter analyze
        working-directory: telovpn
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build split APKs (per ABI)
        working-directory: telovpn
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        working-directory: telovpn
        run: flutter build apk --release

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: telovpn-arm64-release
          path: telovpn/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: telovpn-x64-release
          path: telovpn/build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: telovpn-universal-release
          path: telovpn/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: APK summary
        run: |
          echo "### APK Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ABI | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          for apk in telovpn/build/app/outputs/flutter-apk/*.apk; do
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          done
