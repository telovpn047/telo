name: Build APK

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'telovpn/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'telovpn/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Create asset directories
        run: |
          mkdir -p telovpn/assets/icons
          mkdir -p telovpn/assets/images
          mkdir -p telovpn/android/app/src/main/assets/xray
          mkdir -p telovpn/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p telovpn/android/app/src/main/jniLibs/x86_64

      - name: Download Xray Core binaries
        run: |
          # Android'de yalnızca nativeLibraryDir içindeki dosyalar çalıştırılabilir.
          # Bu yüzden xray ikilisini jniLibs/<abi>/libxray.so olarak paketliyoruz.
          RELEASE=$(curl -fsSL https://api.github.com/repos/XTLS/Xray-core/releases/latest)
          XRAY_VERSION=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "Xray Core: ${XRAY_VERSION}"

          BASE="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}"
          ARM64="telovpn/android/app/src/main/jniLibs/arm64-v8a"
          X64="telovpn/android/app/src/main/jniLibs/x86_64"

          curl -fL "${BASE}/Xray-android-arm64-v8a.zip" -o /tmp/arm64.zip
          unzip -p /tmp/arm64.zip xray > "${ARM64}/libxray.so"

          if curl -fL "${BASE}/Xray-android-x86_64.zip" -o /tmp/x64.zip 2>/dev/null; then
            unzip -p /tmp/x64.zip xray > "${X64}/libxray.so"
          else
            cp "${ARM64}/libxray.so" "${X64}/libxray.so"
          fi

          ls -lh "${ARM64}/" "${X64}/"

      - name: Download tun2socks binaries
        run: |
          # tun2socks ikilisi de jniLibs/<abi>/libtun2socks.so olarak paketlenir.
          # xjasonlyu/tun2socks Go ile statik derlenir; Android için ayrı yapı yoksa
          # linux-arm64 statik ikilisi nativeLibraryDir'den çalışır.
          T2S_RELEASE=$(curl -fsSL https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest)
          T2S_VERSION=$(echo "$T2S_RELEASE" | jq -r '.tag_name')
          echo "tun2socks: ${T2S_VERSION}"

          BASE="https://github.com/xjasonlyu/tun2socks/releases/download/${T2S_VERSION}"
          ARM64="telovpn/android/app/src/main/jniLibs/arm64-v8a"
          X64="telovpn/android/app/src/main/jniLibs/x86_64"

          fetch_t2s() {
            # $1 = abi-candidates (boşlukla ayrılmış), $2 = hedef .so
            # Zip içindeki binary adı sürüme göre değişir (ör. tun2socks-linux-arm64),
            # bu yüzden zip'i açıp ikiliyi adından bağımsız buluyoruz.
            for name in $1; do
              if curl -fL "${BASE}/${name}.zip" -o /tmp/t2s.zip 2>/dev/null; then
                rm -rf /tmp/t2s_ex && mkdir -p /tmp/t2s_ex
                unzip -o /tmp/t2s.zip -d /tmp/t2s_ex >/dev/null 2>&1 || continue
                BIN=$(find /tmp/t2s_ex -type f -name 'tun2socks*' ! -name '*.zip' ! -name '*.md' | head -1)
                [ -z "$BIN" ] && BIN=$(find /tmp/t2s_ex -type f ! -name '*.md' ! -iname 'license*' ! -name '*.txt' | head -1)
                if [ -n "$BIN" ]; then
                  cp "$BIN" "$2"
                  echo "indirildi: ${name} (içeriden $(basename "$BIN"))"
                  return 0
                fi
              fi
            done
            return 1
          }

          fetch_t2s "tun2socks-android-arm64 tun2socks-linux-arm64" "${ARM64}/libtun2socks.so" \
            || { echo "HATA: tun2socks arm64 indirilemedi"; exit 1; }
          fetch_t2s "tun2socks-android-amd64 tun2socks-linux-amd64" "${X64}/libtun2socks.so" \
            || cp "${ARM64}/libtun2socks.so" "${X64}/libtun2socks.so"

          ls -lh "${ARM64}/" "${X64}/"
          # ikililerin gerçekten yerinde olduğunu doğrula
          test -s "${ARM64}/libtun2socks.so" || { echo "HATA: libtun2socks.so boş"; exit 1; }

      - name: Download GeoData
        run: |
          curl -fL "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" \
            -o telovpn/android/app/src/main/assets/xray/geoip.dat
          curl -fL "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat" \
            -o telovpn/android/app/src/main/assets/xray/geosite.dat

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"   > telovpn/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"  >> telovpn/android/local.properties
          echo "flutter.versionCode=1"      >> telovpn/android/local.properties
          echo "flutter.versionName=1.0.0"  >> telovpn/android/local.properties
          cat telovpn/android/local.properties

      - name: Flutter pub get
        working-directory: telovpn
        run: flutter pub get

      - name: Flutter analyze
        working-directory: telovpn
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (universal)
        working-directory: telovpn
        run: |
          flutter build apk --release 2>&1 || {
            # Flutter's copy task may not run in some AGP 8.x + Flutter 3.22 combos.
            # Gradle still produces the APK at the standard Gradle output path.
            FLUTTER_OUT="build/app/outputs/flutter-apk/app-release.apk"
            SRC=""
            [ -f "android/app/build/outputs/apk/release/app-release.apk" ] && \
              SRC="android/app/build/outputs/apk/release/app-release.apk"
            [ -z "$SRC" ] && \
              SRC=$(find android/app/build/outputs -name "*.apk" 2>/dev/null | head -1)
            [ -z "$SRC" ] && \
              SRC=$(find build -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$SRC" ]; then
              echo "APK found at $SRC — promoting to flutter-apk/"
              mkdir -p "$(dirname "$FLUTTER_OUT")"
              cp "$SRC" "$FLUTTER_OUT"
              echo "Size: $(du -h "$FLUTTER_OUT" | cut -f1)"
            else
              echo "ERROR: Gradle produced no APK"
              find android/app/build 2>/dev/null | head -40
              exit 1
            fi
          }

      - name: List APKs
        run: find telovpn/build/app/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: telovpn-release
          path: telovpn/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: APK summary
        run: |
          echo "### APK Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          for apk in telovpn/build/app/outputs/flutter-apk/*.apk; do
            [ -f "$apk" ] && echo "| $(basename $apk) | $(du -h $apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
